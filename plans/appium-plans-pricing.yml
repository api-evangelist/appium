specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Appium
providerId: appium
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Open Source
  - Test Automation
  - WebDriver
  - Mobile Testing
description: Appium is an open-source UI test automation framework governed by the OpenJS Foundation,
  released under the Apache 2.0 license. There is no commercial pricing — the Appium Server API, drivers,
  clients, and plugins are free to download and self-host. Commercial cloud device farms (BrowserStack,
  Sauce Labs, LambdaTest, AWS Device Farm) embed Appium and price device-time/parallel-session separately
  but those are downstream offerings, not Appium itself.
sources:
  - https://appium.io/
  - https://github.com/appium/appium/blob/master/LICENSE
plans:
  - id: appium-open-source
    name: Open Source (Apache 2.0)
    type: freemium
    description: Free, self-hosted Appium server, drivers, clients, and plugins under the Apache 2.0 license.
      Users provide their own infrastructure and devices.
    entries:
      - label: Self-hosted server
        name: self_hosted
        type: quota
        metric: server
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Appium Server (W3C WebDriver)
      - name: First-party drivers (UiAutomator2, XCUITest, Mac2, Windows, etc.)
      - name: Plugin ecosystem
      - name: Community support via Discuss / GitHub
      - name: Apache 2.0 license
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
