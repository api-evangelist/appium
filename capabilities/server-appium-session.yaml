    resources:
    - name: session-sessionId-appium-settings
      path: /session/{sessionId}/appium/settings
      operations:
      - name: getsettings
        method: GET
        description: Appium Get Session Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesettings
