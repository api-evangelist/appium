naftiko: 1.0.0-alpha2
info:
  label: Appium Mobile Test Automation
  description: Workflow capability for mobile app test automation using Appium. Combines session management, element interaction,
    device control, and screenshot capture into a unified automation workflow for QA engineers and test automation engineers
    testing iOS, Android, and cross-platform mobile applications.
  tags:
  - Appium
  - Mobile Testing
  - Test Automation
  - Android
  - iOS
  - QA
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    APPIUM_HOST: APPIUM_HOST
capability:
  consumes:
  - type: http
    namespace: appium
    baseUri: http://localhost:4723
    description: Appium server WebDriver protocol endpoint
    resources:
    - name: server
      path: /status
      description: Server status and session management
      operations:
      - name: get-status
        method: GET
        description: Returns the current status of the Appium server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-sessions
        method: GET
        description: Returns all currently active Appium sessions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: sessions
      path: /session
      description: WebDriver session lifecycle
      operations:
      - name: create-session
        method: POST
        description: Creates a new WebDriver/Appium automation session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            capabilities: '{{tools.capabilities}}'
    - name: session
      path: /session/{sessionId}
      description: Single session operations
      operations:
      - name: delete-session
        method: DELETE
        description: Ends the current automation session
        inputParameters:
        - name: sessionId
          in: path
          type: string
          required: true
          description: The unique session identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: elements
      path: /session/{sessionId}/element
      description: Element discovery and interaction
      operations:
      - name: find-element
        method: POST
        description: Finds the first element matching a locator strategy
        inputParameters:
        - name: sessionId
          in: path
          type: string
          required: true
          description: The unique session identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            using: '{{tools.using}}'
            value: '{{tools.value}}'
    - name: screenshots
      path: /session/{sessionId}/screenshot
      description: Screenshot capture
      operations:
      - name: get-screenshot
        method: GET
        description: Returns a base64-encoded PNG screenshot
        inputParameters:
        - name: sessionId
          in: path
          type: string
          required: true
          description: The unique session identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: device
      path: /session/{sessionId}/appium/device
      description: Appium device-specific commands
      operations:
      - name: activate-app
        method: POST
        description: Brings the specified app to the foreground
        inputParameters:
        - name: sessionId
          in: path
          type: string
          required: true
          description: The unique session identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            appId: '{{tools.appId}}'
      - name: install-app
        method: POST
        description: Installs the app from the given path on the device
        inputParameters:
        - name: sessionId
          in: path
          type: string
          required: true
          description: The unique session identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            appPath: '{{tools.appPath}}'
  exposes:
  - type: rest
    port: 8080
    namespace: mobile-automation-api
    description: Unified REST API for mobile app test automation workflows.
    resources:
    - path: /v1/sessions
      name: sessions
      description: Automation session lifecycle management
      operations:
      - method: POST
        name: start-session
        description: Starts a new mobile automation session
        call: appium.create-session
        with:
          capabilities: rest.capabilities
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/elements
      name: elements
      description: UI element discovery and interaction
      operations:
      - method: POST
        name: find-element
        description: Finds a UI element by locator strategy
        call: appium.find-element
        with:
          sessionId: rest.sessionId
          using: rest.using
          value: rest.value
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/screenshots
      name: screenshots
      description: Screen capture for visual testing
      operations:
      - method: GET
        name: capture-screenshot
        description: Captures the current device screen
        call: appium.get-screenshot
        with:
          sessionId: rest.sessionId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/apps
      name: apps
      description: App installation and lifecycle management
      operations:
      - method: POST
        name: install-app
        description: Installs an app on the test device
        call: appium.install-app
        with:
          sessionId: rest.sessionId
          appPath: rest.appPath
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: launch-app
        description: Launches or activates an installed app
        call: appium.activate-app
        with:
          sessionId: rest.sessionId
          appId: rest.appId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/server/status
      name: server-status
      description: Appium server health check
      operations:
      - method: GET
        name: check-server
        description: Checks Appium server availability
        call: appium.get-status
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: mobile-automation-mcp
    transport: http
    description: MCP server for AI-assisted mobile app test automation.
    tools:
    - name: start-automation-session
      description: Starts a new Appium automation session for a mobile app with platform capabilities (platformName, deviceName,
        app path, etc.)
      hints:
        readOnly: false
        destructive: false
      call: appium.create-session
      with:
        capabilities: tools.capabilities
      outputParameters:
      - type: object
        mapping: $.
    - name: end-automation-session
      description: Ends an Appium automation session and releases device resources
      hints:
        readOnly: false
        destructive: true
      call: appium.delete-session
      with:
        sessionId: tools.sessionId
      outputParameters:
      - type: object
        mapping: $.
    - name: find-ui-element
      description: Finds a UI element in the current app screen using a locator strategy (accessibility id, xpath, id, class
        name)
      hints:
        readOnly: true
        idempotent: true
      call: appium.find-element
      with:
        sessionId: tools.sessionId
        using: tools.using
        value: tools.value
      outputParameters:
      - type: object
        mapping: $.
    - name: capture-screen
      description: Takes a screenshot of the current mobile app screen for visual inspection or debugging
      hints:
        readOnly: true
        idempotent: true
      call: appium.get-screenshot
      with:
        sessionId: tools.sessionId
      outputParameters:
      - type: object
        mapping: $.
    - name: install-mobile-app
      description: Installs a mobile app (.apk or .ipa) on the test device from a local path or URL
      hints:
        readOnly: false
        destructive: false
      call: appium.install-app
      with:
        sessionId: tools.sessionId
        appPath: tools.appPath
      outputParameters:
      - type: object
        mapping: $.
    - name: launch-mobile-app
      description: Launches or brings to foreground a mobile app by package name (Android) or bundle ID (iOS)
      hints:
        readOnly: false
        destructive: false
      call: appium.activate-app
      with:
        sessionId: tools.sessionId
        appId: tools.appId
      outputParameters:
      - type: object
        mapping: $.
    - name: check-appium-server
      description: Checks whether the Appium server is running and ready to accept connections
      hints:
        readOnly: true
        idempotent: true
      call: appium.get-status
      outputParameters:
      - type: object
        mapping: $.
