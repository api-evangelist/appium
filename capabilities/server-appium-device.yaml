naftiko: 1.0.0-alpha2
info:
  label: Appium Server API — Appium Device
  description: 'Appium Server API — Appium Device. 8 operations. Lead operation: Appium Activate App. Self-contained Naftiko
    capability covering one Appium business surface.'
  tags:
  - Appium
  - Appium Device
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APPIUM_API_KEY: APPIUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: server-appium-device
    baseUri: http://localhost:4723
    description: Appium Server API — Appium Device business capability. Self-contained, no shared references.
    resources:
    - name: session-sessionId-appium-device-activate_app
      path: /session/{sessionId}/appium/device/activate_app
      operations:
      - name: activateapp
        method: POST
        description: Appium Activate App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: session-sessionId-appium-device-install_app
      path: /session/{sessionId}/appium/device/install_app
      operations:
      - name: installapp
        method: POST
        description: Appium Install App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: session-sessionId-appium-device-is_keyboard_shown
      path: /session/{sessionId}/appium/device/is_keyboard_shown
      operations:
      - name: iskeyboardshown
        method: GET
        description: Appium Is Keyboard Shown
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: session-sessionId-appium-device-remove_app
      path: /session/{sessionId}/appium/device/remove_app
      operations:
      - name: removeapp
        method: POST
        description: Appium Remove App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: session-sessionId-appium-device-system_time
      path: /session/{sessionId}/appium/device/system_time
      operations:
      - name: getdevicetime
        method: GET
        description: Appium Get Device Time
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: session-sessionId-appium-device-terminate_app
      path: /session/{sessionId}/appium/device/terminate_app
      operations:
      - name: terminateapp
        method: POST
        description: Appium Terminate App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: session-sessionId-orientation
