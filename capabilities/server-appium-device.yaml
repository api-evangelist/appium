          type: object
          value: $.
      - name: setorientation
        method: POST
        description: Appium Set Orientation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: server-appium-device-rest
    port: 8080
    description: REST adapter for Appium Server API — Appium Device. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/session/{sessionid}/appium/device/activate-app
      name: session-sessionid-appium-device-activate-app
      description: REST surface for session-sessionId-appium-device-activate_app.
      operations:
      - method: POST
        name: activateapp
        description: Appium Activate App
        call: server-appium-device.activateapp
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
