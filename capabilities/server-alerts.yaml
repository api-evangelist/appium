naftiko: 1.0.0-alpha2
info:
  label: Appium Server API — Alerts
  description: 'Appium Server API — Alerts. 2 operations. Lead operation: Appium Accept Alert. Self-contained Naftiko capability
    covering one Appium business surface.'
  tags:
  - Appium
  - Alerts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APPIUM_API_KEY: APPIUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: server-alerts
    baseUri: http://localhost:4723
    description: Appium Server API — Alerts business capability. Self-contained, no shared references.
    resources:
    - name: session-sessionId-alert-accept
      path: /session/{sessionId}/alert/accept
      operations:
      - name: acceptalert
        method: POST
        description: Appium Accept Alert
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: session-sessionId-alert-dismiss
      path: /session/{sessionId}/alert/dismiss
      operations:
      - name: dismissalert
        method: POST
        description: Appium Dismiss Alert
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: server-alerts-rest
    port: 8080
    description: REST adapter for Appium Server API — Alerts. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/session/{sessionid}/alert/accept
      name: session-sessionid-alert-accept
      description: REST surface for session-sessionId-alert-accept.
      operations:
      - method: POST
        name: acceptalert
        description: Appium Accept Alert
        call: server-alerts.acceptalert
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/session/{sessionid}/alert/dismiss
      name: session-sessionid-alert-dismiss
      description: REST surface for session-sessionId-alert-dismiss.
      operations:
      - method: POST
        name: dismissalert
        description: Appium Dismiss Alert
        call: server-alerts.dismissalert
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: server-alerts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Appium Server API — Alerts. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: appium-accept-alert
      description: Appium Accept Alert
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: server-alerts.acceptalert
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: appium-dismiss-alert
      description: Appium Dismiss Alert
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: server-alerts.dismissalert
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
