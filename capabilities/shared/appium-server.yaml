naftiko: "1.0.0-alpha1"

info:
  label: Appium Server API
  description: >-
    The Appium Server API implementing the W3C WebDriver protocol for mobile, web,
    desktop, and TV app automation. Provides session management, element interaction,
    actions, screenshots, and device-specific commands.
  tags:
    - Appium
    - Mobile Testing
    - Test Automation
    - Web Driver
    - Android
    - iOS
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      APPIUM_HOST: APPIUM_HOST

capability:
  consumes:
    - type: http
      namespace: appium
      baseUri: "http://localhost:4723"
      description: Appium server WebDriver protocol endpoint
      resources:
        - name: server
          path: /status
          description: Server status and session management
          operations:
            - name: get-status
              method: GET
              description: Returns the current status of the Appium server
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-sessions
              method: GET
              description: Returns all currently active Appium sessions
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: sessions
          path: /session
          description: WebDriver session lifecycle
          operations:
            - name: create-session
              method: POST
              description: Creates a new WebDriver/Appium automation session
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  capabilities: "{{tools.capabilities}}"

        - name: session
          path: /session/{sessionId}
          description: Single session operations
          operations:
            - name: delete-session
              method: DELETE
              description: Ends the current automation session
              inputParameters:
                - name: sessionId
                  in: path
                  type: string
                  required: true
                  description: The unique session identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: elements
          path: /session/{sessionId}/element
          description: Element discovery and interaction
          operations:
            - name: find-element
              method: POST
              description: Finds the first element matching a locator strategy
              inputParameters:
                - name: sessionId
                  in: path
                  type: string
                  required: true
                  description: The unique session identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  using: "{{tools.using}}"
                  value: "{{tools.value}}"

        - name: screenshots
          path: /session/{sessionId}/screenshot
          description: Screenshot capture
          operations:
            - name: get-screenshot
              method: GET
              description: Returns a base64-encoded PNG screenshot
              inputParameters:
                - name: sessionId
                  in: path
                  type: string
                  required: true
                  description: The unique session identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: device
          path: /session/{sessionId}/appium/device
          description: Appium device-specific commands
          operations:
            - name: activate-app
              method: POST
              description: Brings the specified app to the foreground
              inputParameters:
                - name: sessionId
                  in: path
                  type: string
                  required: true
                  description: The unique session identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  appId: "{{tools.appId}}"
            - name: install-app
              method: POST
              description: Installs the app from the given path on the device
              inputParameters:
                - name: sessionId
                  in: path
                  type: string
                  required: true
                  description: The unique session identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  appPath: "{{tools.appPath}}"

  exposes:
    - type: rest
      port: 8100
      namespace: appium-server-api
      resources:
        - path: /v1/status
          name: server-status
          description: Appium server status
          operations:
            - method: GET
              name: get-server-status
              description: Returns Appium server status
              call: "appium.get-status"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/sessions
          name: sessions
          description: WebDriver session management
          operations:
            - method: POST
              name: create-session
              description: Creates a new automation session
              call: "appium.create-session"
              with:
                capabilities: "rest.capabilities"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/elements
          name: elements
          description: Element discovery
          operations:
            - method: POST
              name: find-element
              description: Finds an element by locator strategy
              call: "appium.find-element"
              with:
                sessionId: "rest.sessionId"
                using: "rest.using"
                value: "rest.value"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: appium-server-mcp
      transport: http
      tools:
        - name: get-server-status
          description: Returns the current Appium server status and readiness
          hints:
            readOnly: true
            idempotent: true
          call: "appium.get-status"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-session
          description: Creates a new Appium automation session with platform capabilities
          hints:
            readOnly: false
            destructive: false
          call: "appium.create-session"
          with:
            capabilities: "tools.capabilities"
          outputParameters:
            - type: object
              mapping: "$."

        - name: delete-session
          description: Ends an Appium automation session and releases resources
          hints:
            readOnly: false
            destructive: true
          call: "appium.delete-session"
          with:
            sessionId: "tools.sessionId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: find-element
          description: Finds the first element matching a locator strategy in the current screen
          hints:
            readOnly: true
            idempotent: true
          call: "appium.find-element"
          with:
            sessionId: "tools.sessionId"
            using: "tools.using"
            value: "tools.value"
          outputParameters:
            - type: object
              mapping: "$."

        - name: take-screenshot
          description: Captures a screenshot of the current app screen
          hints:
            readOnly: true
            idempotent: true
          call: "appium.get-screenshot"
          with:
            sessionId: "tools.sessionId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: activate-app
          description: Brings a mobile app to the foreground
          hints:
            readOnly: false
            destructive: false
          call: "appium.activate-app"
          with:
            sessionId: "tools.sessionId"
            appId: "tools.appId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: install-app
          description: Installs a mobile app on the device
          hints:
            readOnly: false
            destructive: false
          call: "appium.install-app"
          with:
            sessionId: "tools.sessionId"
            appPath: "tools.appPath"
          outputParameters:
            - type: object
              mapping: "$."
