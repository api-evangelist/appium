name: Appium
description: >-
  Appium is an open-source test automation framework governed by the OpenJS Foundation,
  designed to facilitate UI automation of many app platforms including mobile (iOS, Android),
  browser (Chrome, Firefox, Safari), desktop (macOS, Windows), and TV (Roku, tvOS, Android TV).
  It implements the W3C WebDriver protocol and provides an extensible ecosystem of drivers,
  clients, and plugins.
image: https://appium.io/docs/en/latest/assets/images/appium-logo.png
created: '2024-01-15'
modified: '2026-05-19'
specificationVersion: '0.18'
url: https://appium.io/apis.json
apis:
  - name: Appium Server API
    description: >-
      The main Appium server API that implements the W3C WebDriver protocol for mobile,
      web, desktop, and TV app automation. Supports session management, element interaction,
      actions, screenshots, and Appium-specific device commands.
    image: https://appium.io/docs/en/latest/assets/images/appium-logo.png
    humanURL: https://appium.io/
    baseURL: http://localhost:4723
    tags:
      - Android
      - Automation
      - iOS
      - Mobile Testing
      - WebDriver
    properties:
      - type: Documentation
        url: https://appium.io/docs/en/latest/
      - type: OpenAPI
        url: openapi/appium-server-openapi.yaml
      - type: GitHubRepository
        url: https://github.com/appium/appium
