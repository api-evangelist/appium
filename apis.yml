  - name: Appium Inspector
    description: >-
      Standalone GUI inspector for mobile apps that communicates with an Appium server,
      enabling visual element inspection and XPath generation for test authoring.
    humanURL: https://github.com/appium/appium-inspector
    baseURL: https://github.com/appium/appium-inspector/releases
    tags:
      - Debugging
      - GUI
      - Inspector
      - Mobile Testing
    properties:
      - type: GitHubRepository
        url: https://github.com/appium/appium-inspector
      - type: SDK
        url: https://github.com/appium/appium-inspector/releases
        title: Desktop App Downloads
  - name: Appium UiAutomator2 Driver
    description: >-
      The primary Appium driver for Android automation, backed by Google's UiAutomator2
      framework. Supports Android 5.0+ devices and emulators.
    humanURL: https://github.com/appium/appium-uiautomator2-driver
    baseURL: http://localhost:4723
    tags:
      - Android
      - Automation
      - Driver
      - Mobile Testing
    properties:
      - type: GitHubRepository
        url: https://github.com/appium/appium-uiautomator2-driver
      - type: Documentation
        url: https://github.com/appium/appium-uiautomator2-driver#readme
  - name: Appium XCUITest Driver
    description: >-
      The primary Appium driver for iOS and tvOS automation, backed by Apple's XCTest
      framework. Supports iOS 12+ and macOS Sequoia.
    humanURL: https://github.com/appium/appium-xcuitest-driver
    baseURL: http://localhost:4723
    tags:
      - Automation
      - Driver
      - iOS
      - Mobile Testing
      - tvOS
