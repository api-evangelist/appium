description: 'FOCUS-aligned FinOps view for Appium: the framework itself is free and Apache-2.0 licensed
  with no direct charges. FinOps allocation should focus on the underlying compute (CI/CD runners, mac
  build hosts, device farms) and managed-cloud Appium services (BrowserStack, Sauce Labs, AWS Device Farm,
  LambdaTest) where actual spend occurs.'
sources:
  - https://appium.io/
  - https://github.com/appium/appium/blob/master/LICENSE
billingModel:
  pricingCategory: Open Source (No Charge)
  billingFrequency: N/A
  billingCurrency: USD
  chargeCategories:
    - Usage
focusColumns:
  ServiceName: Appium
  ServiceCategory: Test Automation / WebDriver
  ProviderName: OpenJS Foundation / Appium
  PublisherName: OpenJS Foundation
  InvoiceIssuerName: N/A (no invoice)
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: appium_server_hours
    description: Hours of self-hosted Appium server runtime, used to attribute infrastructure cost
    unit: instance-hour
    aggregation: sum
    dimensions:
      - host_type
      - environment
  - name: device_minutes
    description: Connected-device wall-clock minutes consumed by test sessions
    unit: minute
    aggregation: sum
    dimensions:
      - platform
      - device_type
  - name: parallel_sessions
    description: Peak concurrent sessions, used for grid sizing
    unit: session
    aggregation: max
    dimensions:
      - environment
  - name: cloud_grid_minutes
    description: Minutes consumed on managed Appium clouds (BrowserStack, Sauce Labs, AWS Device Farm,
      etc.) — actual billed spend
    unit: minute
    aggregation: sum
    dimensions:
      - cloud_provider
      - device_type
principles:
  - name: Visibility
    description: Capture per-suite session duration and per-device minutes from CI/CD runs; correlate
      to underlying compute or cloud-grid invoices.
  - name: Allocation
    description: Allocate test infrastructure cost to the consuming team or product based on session count
      and device-minutes; tag CI jobs with team metadata.
  - name: Optimization
    description: Reuse driver sessions; parallelize across devices; prefer emulator/simulator where fidelity
      allows; choose cloud-grid tier (parallel sessions) sized to peak rather than peak+headroom.
  - name: Accountability
    description: QE / Platform team owns the Appium grid contract or self-hosted infra; product engineering
      teams accountable for test-suite efficiency and minute consumption.
maintainers:
