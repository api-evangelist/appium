components:
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      description: The unique session identifier
      schema:
        type: string
      example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
    ElementId:
      name: elementId
      in: path
      required: true
      description: The unique element identifier within the session
      schema:
        type: string
      example: '1234567890'
  schemas:
    StatusResponse:
      title: StatusResponse
      description: Appium server status response
      type: object
      properties:
        value:
          type: object
          description: Status object
          properties:
            ready:
              type: boolean
              description: Whether the server is ready to accept connections
              example: true
            message:
              type: string
              description: Human-readable status message
              example: The server is ready to accept new connections
            build:
              type: object
              description: Server build information
              properties:
                version:
                  type: string
                  description: Appium version
                  example: 2.5.0
    CreateSessionRequest:
      title: CreateSessionRequest
      description: Request body for creating a new WebDriver session
      type: object
      properties:
        capabilities:
          type: object
          description: W3C capabilities object with alwaysMatch and firstMatch
          properties:
            alwaysMatch:
              type: object
              description: Capabilities that must be matched exactly
            firstMatch:
              type: array
              description: List of capabilities to try matching in order
              items:
                type: object
    SessionResponse:
      title: SessionResponse
      description: Response from session creation
      type: object
      properties:
        sessionId:
          type: string
          description: The unique session identifier
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        value:
          type: object
          description: Session capabilities and metadata
    SessionsListResponse:
      title: SessionsListResponse
      description: List of active Appium sessions
      type: object
      properties:
        value:
          type: array
          items:
            $ref: '#/components/schemas/SessionInfo'
    SessionInfo:
      title: SessionInfo
      description: Information about a single active session
      type: object
      properties:
        id:
          type: string
          description: Session identifier
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        capabilities:
          type: object
          description: The capabilities used to create the session
    FindElementRequest:
      title: FindElementRequest
      description: Request to find an element using a locator strategy
      type: object
      required:
        - using
        - value
      properties:
        using:
          type: string
          description: The element locator strategy
          enum:
            - accessibility id
            - id
            - xpath
            - class name
            - name
            - css selector
            - link text
            - partial link text
            - -android uiautomator
            - -android datamatcher
            - -ios predicate string
            - -ios class chain
          example: accessibility id
        value:
          type: string
          description: The selector value for the locator strategy
          example: Login Button
    ElementResponse:
      title: ElementResponse
      description: Single element returned from a find operation
      type: object
      properties:
        value:
          type: object
          description: Element reference object
          properties:
            ELEMENT:
              type: string
              description: Legacy element identifier
              example: '1234567890'
            element-6066-11e4-a52e-4f735466cecf:
              type: string
              description: W3C element identifier
              example: '1234567890'
    ElementsResponse:
      title: ElementsResponse
      description: Multiple elements returned from a find operation
      type: object
      properties:
        value:
          type: array
          items:
            type: object
            properties:
              ELEMENT:
                type: string
                example: '1234567890'
              element-6066-11e4-a52e-4f735466cecf:
                type: string
                example: '1234567890'
    ActionsRequest:
      title: ActionsRequest
      description: W3C Actions request body
      type: object
      required:
        - actions
      properties:
        actions:
          type: array
          description: List of action sequences
          items:
            $ref: '#/components/schemas/ActionSequence'
    ActionSequence:
      title: ActionSequence
      description: A sequence of input actions for a single input source
      type: object
      properties:
        type:
          type: string
          enum:
            - pointer
            - key
            - wheel
            - none
          description: The type of input source
          example: pointer
        id:
          type: string
          description: Unique identifier for this input source
          example: finger1
        parameters:
          type: object
          description: Input source parameters (e.g. pointerType)
        actions:
          type: array
          description: List of individual action objects
          items:
            type: object
    AppIdRequest:
      title: AppIdRequest
      description: Request body identifying an app by package name or bundle ID
      type: object
      properties:
        appId:
          type: string
          description: App package name (Android) or bundle ID (iOS)
          example: com.example.app
        bundleId:
          type: string
          description: iOS bundle identifier
          example: com.example.app
    CookiesResponse:
      title: CookiesResponse
      description: List of browser cookies
      type: object
      properties:
        value:
          type: array
          items:
            $ref: '#/components/schemas/Cookie'
    Cookie:
      title: Cookie
      description: Browser cookie object
      type: object
      properties:
        name:
          type: string
          description: Cookie name
          example: session
        value:
          type: string
          description: Cookie value
          example: abc123
        domain:
          type: string
          description: Cookie domain
          example: example.com
        path:
          type: string
          description: Cookie path
          example: /
        httpOnly:
          type: boolean
          description: Whether the cookie is HTTP-only
          example: false
        secure:
          type: boolean
          description: Whether the cookie requires HTTPS
          example: false
    SettingsResponse:
      title: SettingsResponse
      description: Appium session settings
      type: object
      properties:
        value:
          type: object
          description: Key-value map of current settings
    EmptyValueResponse:
      title: EmptyValueResponse
      description: Standard response with null value
      type: object
      properties:
        value:
          nullable: true
          description: Always null for commands that have no return value
    StringValueResponse:
      title: StringValueResponse
      description: Standard response with a string value
      type: object
      properties:
        value:
          type: string
          description: The returned string value
    BooleanValueResponse:
      title: BooleanValueResponse
      description: Standard response with a boolean value
      type: object
      properties:
        value:
          type: boolean
          description: The returned boolean value
    ArrayValueResponse:
      title: ArrayValueResponse
      description: Standard response with an array value
      type: object
      properties:
        value:
          type: array
          description: The returned array value
          items:
            type: string
    ErrorResponse:
      title: ErrorResponse
      description: WebDriver error response
      type: object
      properties:
        value:
          type: object
          properties:
            error:
              type: string
              description: Error code
              example: no such element
            message:
              type: string
              description: Human-readable error message
              example: An element could not be located on the page using the given search parameters.
            stacktrace:
              type: string
              description: Stack trace for debugging
