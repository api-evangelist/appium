specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Appium
providerId: appium
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - Open Source
  - WebDriver
  - Test Automation
description: Appium is a self-hosted W3C WebDriver server. The Appium project does not impose any cloud
  rate limits — practical throughput is bounded only by the host machine's CPU/memory, the underlying
  device or simulator capacity, and the WebDriver protocol's session model (typically one session per
  driver instance at a time). Cloud device farms that wrap Appium (BrowserStack, Sauce Labs, etc.) impose
  their own per-account parallel-session and minute-based quotas — see those providers for numeric limits.
sources:
  - https://appium.io/docs/en/latest/
  - https://www.w3.org/TR/webdriver2/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Concurrent sessions per server
    scope: server
    metric: concurrent_sessions
    limit: bounded by host capacity
    notes: Each WebDriver session typically owns one device/simulator/browser; concurrency is bounded
      by host hardware and number of attached devices.
  - name: WebDriver request rate
    scope: session
    metric: varies
    limit: not enforced by Appium
    notes: No application-layer rate limit is enforced; clients can issue commands as fast as the underlying
      device responds.
policies:
  - name: Self-Hosted Capacity Planning
    description: Users size Appium server hosts and connected device pools to their parallelism needs;
      monitor host CPU/memory and adapter timeouts.
  - name: Session Lifecycle
    description: Reuse driver sessions where possible; closing and re-opening sessions has high overhead
      against the underlying device automation stack.
  - name: Cloud Provider Limits Apply
    description: When using BrowserStack, Sauce Labs, LambdaTest, AWS Device Farm, Kobiton, or similar
      managed Appium grids, that provider's parallel-session and per-minute limits govern.
maintainers:
